<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 720" role="img" aria-labelledby="title desc">
  <title id="title">LatamSoft stacked isologo, light version</title>
  <desc id="desc">Stacked LatamSoft logo with symbol above the wordmark on a transparent background.</desc>
  <defs>
    <linearGradient id="ls-blue" x1="140" y1="80" x2="300" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#063B5C"/>
      <stop offset="1" stop-color="#0A4E78"/>
    </linearGradient>
    <linearGradient id="ls-teal" x1="245" y1="150" x2="430" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12C7B8"/>
      <stop offset="1" stop-color="#0EA9BC"/>
    </linearGradient>
    <style>
      .wordmark { font-family: "Space Grotesk", "Sora", "Inter", "Segoe UI", Arial, sans-serif; font-size: 86px; font-weight: 760; letter-spacing: 0; }
    </style>
  </defs>
  <g transform="translate(252 64)">
    <path d="M52 36v86c0 18 10 28 28 28h58" fill="none" stroke="url(#ls-blue)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M99 84h76c19 0 30 11 30 29v4c0 19-11 30-30 30h-49c-18 0-29 10-29 28v0c0 18 11 29 29 29h79" fill="none" stroke="url(#ls-teal)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="109" y="109" width="38" height="38" rx="10" fill="#B7F45A"/>
  </g>
  <text class="wordmark" x="120" y="480" fill="#17202A">Latam</text>
  <text class="wordmark" x="358" y="480" fill="#063B5C">Soft</text>
  <text x="126" y="548" fill="#526373" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="600" letter-spacing="0">Software que simplifica procesos</text>
</svg>
